<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Dettaglio Squadra</title>
    </head>
    <body>

    <h1 th:text="${squadra.nome}">Nome squadra</h1>

    <p>
        <strong>Città:</strong>
        <span th:text="${squadra.citta}"></span>
    </p>

    <p>
        <strong>Anno di fondazione:</strong>
        <span th:text="${squadra.annoFondazione}"></span>
    </p>

    <h2>Giocatori</h2>

    <ul>
        <li th:each="giocatore : ${squadra.giocatori}">
            <a th:href="@{/giocatori/{id}(id=${giocatore.id})}"
            th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">
            </a>
        </li>
    </ul>

    <div th:if="${isAdmin}">

        <a th:href="@{/admin/squadra/{id}/edit(id=${squadra.id})}">
            Modifica
        </a>

        <form th:action="@{/admin/squadra/{id}/delete(id=${squadra.id})}"
              method="post">

            <button type="submit">
                Elimina squadra
            </button>

        </form>

    </div>


    <a th:href="@{/squadre}">Torna alle squadre</a>

    </body>
</html>
